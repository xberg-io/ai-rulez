version = "4.0"
name = "ai-rulez"
description = "Shared AI governance modules for kreuzberg.dev polyglot projects"
gitignore = true

presets = ["claude", "codex", "copilot", "cursor", "antigravity"]

builtins = [
  "!git-workflow",
  "!testing",
  "code-quality",
  "security",
  "token-efficiency",
  "default-commands",
]

[[mcp_servers]]
name = "github"
description = "GitHub integration for repository operations and automation"
command = "npx"
args = ["-y", "@modelcontextprotocol/server-github"]
transport = "stdio"
enabled = true

[mcp_servers.env]
GITHUB_PERSONAL_ACCESS_TOKEN = "${GITHUB_TOKEN}"

[[mcp_servers]]
name = "ai-rulez"
description = "AI-Rulez MCP server for configuration management"
command = "ai-rulez"
args = ["mcp"]
transport = "stdio"
enabled = true
