# Generated by scripts/migrate_to_poly.py from .pre-commit-config.yaml + tool configs. Review before committing.

# discovery-exclude (pending polylint feature): direct `poly lint .`/`poly fmt .` does not yet honor these; they apply
# to the hook builtins below. Globs:
#   **/*.lock
#   **/Cargo.lock
#   **/go.sum
#   **/package-lock.json
#   **/pnpm-lock.yaml
#   **/uv.lock
#   docs/snippets/**
#   invalid*/**
#   node_modules/**
#   target/**
#   v3/**
#   vendor/**

[defaults]
line_length = 120
line_ending = "lf"
final_newline = true
trim_trailing_whitespace = true

[lint.markdown.rumdl]
disable = [
    "MD012",
    "MD013",
    "MD024",
    "MD033",
    "MD036",
    "MD041",
    "MD046",
    "MD051",
    "MD076",
]

[fmt.markdown.rumdl]
disable = [
    "MD012",
    "MD013",
    "MD024",
    "MD033",
    "MD036",
    "MD041",
    "MD046",
    "MD051",
    "MD076",
]

[hooks]
stages = ["pre-commit"]

[hooks.builtin]
polylint = { exclude = [
    "**/*.lock",
    "**/Cargo.lock",
    "**/go.sum",
    "**/package-lock.json",
    "**/pnpm-lock.yaml",
    "**/uv.lock",
    "docs/snippets/**",
    "invalid*/**",
    "node_modules/**",
    "target/**",
    "v3/**",
    "vendor/**",
] }
polyfmt = { exclude = [
    "**/*.lock",
    "**/Cargo.lock",
    "**/go.sum",
    "**/package-lock.json",
    "**/pnpm-lock.yaml",
    "**/uv.lock",
    "docs/snippets/**",
    "invalid*/**",
    "node_modules/**",
    "target/**",
    "v3/**",
    "vendor/**",
] }
commit = { stages = ["commit-msg"] }
file_safety = { exclude = [
    "**/*.lock",
    "**/Cargo.lock",
    "**/go.sum",
    "**/package-lock.json",
    "**/pnpm-lock.yaml",
    "**/uv.lock",
    "docs/snippets/**",
    "invalid*/**",
    "node_modules/**",
    "target/**",
    "v3/**",
    "vendor/**",
] }

# --- catalog tools (standalone binaries, PATH-probed) ---
[tools.actionlint]
enabled = true

# --- lightweight inline script hooks (no toolchain) ---
[hooks.pre-commit.scripts.gh_actions_updater]
# TODO: wire to vendored script / task target (was a shared pre-commit-hooks hook).
run = "TODO-gh-actions-updater"
